name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env: 
          JWT_SECRET_KEY: "test-secret-key"
          GROQ_API_KEY: "test-groq-key"
        run: pytest tests/ -v
